<!DOCTYPE html>
<html lang="zh-TW" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
  <title>2560 戰法</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/config.js"></script>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --surface:    #1a1a1a;
      --surface-2:  #212121;
      --border:     #303030;
      --text:       #e8e8e8;
      --muted:      #9a9a9a;
      --green:      #00d664;
      --red:        #ff1744;
      --yellow:     #ffd600;
      --blue:       #3b82f6;
      --blue-dim:   rgba(59,130,246,0.12);
      --green-dim:  rgba(0,214,100,0.12);
      --red-dim:    rgba(255,23,68,0.12);
      --tab-h:      62px;
      --safe-t:     env(safe-area-inset-top, 0px);
      --safe-b:     env(safe-area-inset-bottom, 0px);
      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: var(--safe-t);
      padding-bottom: calc(var(--tab-h) + var(--safe-b) + 8px);
    }

    /* ── Pages ─────────────────────────────────────────────── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ── Tab bar ────────────────────────────────────────────── */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .tab {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.78rem;
      transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: var(--blue); }
    .tab.active::after {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 2px;
      background: var(--blue);
      border-radius: 0 0 3px 3px;
    }
    .tab svg { width: 22px; height: 22px; }

    /* ── Common UI ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card.clickable { cursor: pointer; }
    .card.clickable:active { opacity: .85; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.73rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      letter-spacing: 0.01em;
    }
    .badge.green  { background: var(--green-dim);  color: var(--green); }
    .badge.red    { background: var(--red-dim);    color: var(--red);   }
    .badge.muted  { background: var(--border);     color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .72; transform: scale(0.98); }
    .btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
    .btn.primary   { background: var(--blue);   color: #fff; }
    .btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn.danger    { background: var(--red-dim); color: var(--red); }
    .btn.full      { width: 100%; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--blue); }
    select { cursor: pointer; }

    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }

    .field { margin-bottom: 12px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 52px 24px;
      font-size: 0.9rem;
      line-height: 1.75;
    }

    h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; }
    h3 { font-size: 1.05rem; font-weight: 600; }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .text-green { color: var(--green); }
    .text-red   { color: var(--red);   }
    .text-muted { color: var(--muted); }
    .text-sm    { font-size: 0.85rem; }

    /* ── Loading ────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; border-top-color: var(--blue); } }

    /* ── Toast ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--tab-h) + var(--safe-b) + 18px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(36,36,36,0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 22px;
      font-size: 0.9rem;
      z-index: 999;
      opacity: 0;
      transition: opacity .22s, transform .22s;
      pointer-events: none;
      white-space: normal;
      max-width: calc(100% - 80px);
      text-align: center;
      line-height: 1.5;
      box-shadow: 0 4px 20px rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,0.06);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Sheet (bottom drawer) ──────────────────────────────── */
    .sheet-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .sheet-overlay.open { display: block; }

    .sheet {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 10px 16px calc(20px + var(--safe-b));
      z-index: 201;
      max-height: 90vh;
      overflow-y: auto;
    }
    .sheet::before {
      content: "";
      display: block;
      width: 36px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .sheet h3 { margin-bottom: 16px; }

    /* ── Stats grid ─────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .stat-card .val { font-size: 1.5rem; font-weight: 700; margin-top: 4px; line-height: 1.2; }

    /* ── Toggle ─────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    input[type=checkbox] { width: 38px; height: 22px; accent-color: var(--blue); flex-shrink: 0; }

    /* ── Compact badge (for inline multi-badge rows like outcome tracking) ── */
    .badge-compact {
      display: inline-block;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 0.73rem;
      font-weight: 600;
    }

    /* ── Range input (cross-browser slider chrome) ───────────────── */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      border-radius: 4px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--blue);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--blue);
      cursor: pointer;
      border: none;
    }

    /* ── Font size ────────────────────────────────────────────── */
    html[data-fs="sm"] { font-size: 13px; }
    html[data-fs="md"] { font-size: 14px; }
    html[data-fs="lg"] { font-size: 16px; }

    /* ── Global font-size button (always visible, all tabs) ─── */
    #global-fs-btn {
      position: fixed;
      bottom: calc(var(--tab-h) + var(--safe-b) + 12px);
      right: 12px;
      z-index: 150;
      background: rgba(26,26,26,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
      transition: opacity .15s;
    }
    #global-fs-btn:active { opacity: .7; }
  </style>
  <script>
    // Apply saved font size before render to avoid FOUC (targets html element via html[data-fs=...] CSS)
    var _fs = localStorage.getItem("fontSize");
    document.documentElement.dataset.fs = ["sm","md","lg"].includes(_fs) ? _fs : "md";
  </script>
</head>
<body>
<div id="app">
  <div id="content">
    <div id="page-watchlist" class="page active"></div>
    <div id="page-chart"     class="page"></div>
    <div id="page-trades"    class="page"></div>
    <div id="page-stats"     class="page"></div>
    <div id="page-reminders" class="page"></div>
    <div id="page-help"      class="page"></div>
  </div>

  <nav id="tab-bar">
    <div class="tab active" data-tab="watchlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      自選
    </div>
    <div class="tab" data-tab="chart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      圖表
    </div>
    <div class="tab" data-tab="trades">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      交易
    </div>
    <div class="tab" data-tab="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
      統計
    </div>
    <div class="tab" data-tab="reminders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      提醒
    </div>
    <div class="tab" data-tab="help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      說明
    </div>
  </nav>
</div>

<div id="toast"></div>
<button id="global-fs-btn" title="字體大小">A</button>

<!-- Bottom sheet (shared) -->
<div id="sheet-overlay" class="sheet-overlay">
  <div id="sheet" class="sheet">
    <div id="sheet-content"></div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
