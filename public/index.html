<!DOCTYPE html>
<html lang="zh-TW" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>2560 戰法</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/config.js"></script>
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --text:     #e8e8e8;
      --muted:    #888;
      --green:    #00c853;
      --red:      #ff1744;
      --yellow:   #ffd600;
      --blue:     #2979ff;
      --tab-h:    56px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--tab-h) + var(--safe-b) + 8px);
    }

    /* ── Pages ─────────────────────────────────────────────── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ── Tab bar ────────────────────────────────────────────── */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      color: var(--muted);
      font-size: 10px;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: var(--blue); }
    .tab svg { width: 22px; height: 22px; }

    /* ── Common UI ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .badge.green  { background: rgba(0,200,83,.15);  color: var(--green); }
    .badge.red    { background: rgba(255,23,68,.15);  color: var(--red);   }
    .badge.muted  { background: var(--border);         color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .7; }
    .btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
    .btn.primary   { background: var(--blue);   color: #fff; }
    .btn.secondary { background: var(--border); color: var(--text); }
    .btn.danger    { background: rgba(255,23,68,.15); color: var(--red); }
    .btn.full      { width: 100%; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--blue); }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }

    .field { margin-bottom: 12px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 24px;
      font-size: 13px;
    }

    h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    h3 { font-size: 15px; font-weight: 600; }

    .text-green { color: var(--green); }
    .text-red   { color: var(--red);   }
    .text-muted { color: var(--muted); }
    .text-sm    { font-size: 12px; }

    /* ── Loading ────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; border-top-color: var(--blue); } }

    /* ── Toast ──────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--tab-h) + var(--safe-b) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      white-space: normal;
      max-width: calc(100% - 48px);
      text-align: center;
      line-height: 1.5;
    }
    #toast.show { opacity: 1; }

    /* ── Sheet (bottom drawer) ──────────────────────────────── */
    .sheet-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
    }
    .sheet-overlay.open { display: block; }

    .sheet {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 20px 16px calc(20px + var(--safe-b));
      z-index: 201;
    }
    .sheet h3 { margin-bottom: 16px; }

    /* ── Stats grid ─────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .stat-card .val { font-size: 22px; font-weight: 700; margin-top: 2px; }

    /* ── Toggle ─────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    input[type=checkbox] { width: 36px; height: 20px; accent-color: var(--blue); }
  </style>
</head>
<body>
<div id="app">
  <div id="content">
    <div id="page-watchlist" class="page active"></div>
    <div id="page-chart"     class="page"></div>
    <div id="page-trades"    class="page"></div>
    <div id="page-stats"     class="page"></div>
    <div id="page-reminders" class="page"></div>
  </div>

  <nav id="tab-bar">
    <div class="tab active" data-tab="watchlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      自選
    </div>
    <div class="tab" data-tab="chart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      圖表
    </div>
    <div class="tab" data-tab="trades">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      交易
    </div>
    <div class="tab" data-tab="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
      統計
    </div>
    <div class="tab" data-tab="reminders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      提醒
    </div>
  </nav>
</div>

<div id="toast"></div>

<!-- Bottom sheet (shared) -->
<div id="sheet-overlay" class="sheet-overlay">
  <div id="sheet" class="sheet">
    <div id="sheet-content"></div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
