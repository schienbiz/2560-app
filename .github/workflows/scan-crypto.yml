name: Scan — Crypto

on:
  schedule:
    - cron: "0 1 * * *"   # 9:00 AM Taipei (UTC+8), daily — after Kraken UTC-midnight daily candle settles
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Trigger crypto scan
        run: |
          curl -f --max-time 90 -X POST "${{ secrets.APP_URL }}/internal/scan?market=crypto" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"
