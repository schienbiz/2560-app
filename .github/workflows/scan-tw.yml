name: Scan — Taiwan stocks

on:
  schedule:
    - cron: "0 6 * * 1-5"   # 2:00 PM Taipei (UTC+8), Mon–Fri — after TW/HK market close (1:30 PM)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Trigger TW stock scan
        run: |
          curl -f --max-time 90 -X POST "${{ secrets.APP_URL }}/internal/scan?market=tw" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"

      # cron 失敗 = 後端(Worker→two560-app-2)市場時段掛了；後端可睡不能 proactively ping，
      # 此 dead-man 告警是非-keepalive 的 runtime 健康 backstop（補 /__up edge-only 盲點）。
      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.HEALTH_CHECK_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.HEALTH_CHECK_CHAT_ID }}" \
            -d text="🔴 2560 scan-tw 失敗 — 後端(Worker→two560-app-2)可能掛了，收盤後無法掃描。查 Render dashboard / Actions log。" > /dev/null || true
