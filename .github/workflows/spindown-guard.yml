name: Render spin-down guard

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 min — Render free tier spins down after 15 min idle
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: curl -sf --max-time 10 "${{ secrets.APP_URL }}/health" > /dev/null
