name: Morning AI summary

on:
  schedule:
    - cron: "0 0 * * *"        # 8:00am Taipei (UTC+8) daily
  workflow_dispatch:             # manual trigger for testing

jobs:
  morning-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Trigger morning summary
        run: |
          curl -f --max-time 60 -X POST "${{ secrets.APP_URL }}/internal/morning-summary" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"
