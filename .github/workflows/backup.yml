name: Daily database backup

on:
  schedule:
    - cron: "0 18 * * *"   # 2:00am Taipei (UTC+8)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -y -q
          sudo apt-get install -y postgresql-client-17

      - name: Backup to artifact
        run: |
          set -eo pipefail
          BACKUP_FILE="backup-$(date +%Y%m%d).sql.gz"
          pg_dump "${{ secrets.DIRECT_URL }}" | gzip > "$BACKUP_FILE"
          [ -s "$BACKUP_FILE" ] || { echo "Backup file is empty — pg_dump likely failed"; exit 1; }

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: "*.sql.gz"
          retention-days: 90
