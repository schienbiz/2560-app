name: Reminders — US stocks

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 8:30 PM Taipei (UTC+8), Mon–Fri — ~1 hour before US market opens (9:30 PM Taipei)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send US stock reminders
        run: |
          curl -f --max-time 30 -X POST "${{ secrets.APP_URL }}/internal/remind?market=us" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.HEALTH_CHECK_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.HEALTH_CHECK_CHAT_ID }}" \
            -d text="🔴 2560 remind-us 失敗 — 後端(Worker→two560-app-2)可能掛了，提醒未發出。查 Render dashboard / Actions log。" > /dev/null || true
