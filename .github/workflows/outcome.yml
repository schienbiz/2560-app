name: Daily outcome computation

on:
  schedule:
    - cron: "0 10 * * *"    # 6:00pm Taipei (UTC+8) — after scan + OHLCV cache is warm
  workflow_dispatch:          # manual trigger for testing

jobs:
  outcome:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render (cold start can take 30-60s)
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Trigger outcome cron
        run: |
          curl -f --max-time 90 -X POST "${{ secrets.APP_URL }}/internal/outcome" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"
