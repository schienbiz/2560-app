name: Daily Service Health Check

on:
  schedule:
    - cron: "30 1 * * *"   # 09:30 Taipei (UTC+8)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check all services and notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.HEALTH_CHECK_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.HEALTH_CHECK_CHAT_ID }}
        run: |
          check() {
            local label="$1"
            local url="$2"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 8 --max-time 15 "$url" 2>/dev/null)
            if [ "$code" = "200" ]; then
              echo "✅ ${label}"
            else
              echo "❌ ${label} (HTTP ${code:-timeout})"
            fi
          }

          R1=$(check "voice-trainer (Render)"    "https://voice-trainer.onrender.com/health")
          R2=$(check "2560-app (Render)"          "https://two560-app.onrender.com/health")
          R3=$(check "marketing (chusMBp)"        "https://cancel-aneurism-uneven.ngrok-free.dev/health")
          R4=$(check "ai-pm (chusMBp)"            "https://cancel-aneurism-uneven.ngrok-free.dev/pm/api/status")
          R5=$(check "ai-learning (chusMBp)"      "https://cancel-aneurism-uneven.ngrok-free.dev/learn")
          R6=$(check "proxy (chusMBp)"            "https://cancel-aneurism-uneven.ngrok-free.dev/health")

          FAIL_COUNT=$(printf '%s\n' "$R1" "$R2" "$R3" "$R4" "$R5" "$R6" | grep -c "^❌" || true)

          if [ "$FAIL_COUNT" -eq 0 ]; then
            HEADER="🟢 全部正常 All services healthy"
          else
            HEADER="🔴 ${FAIL_COUNT} 個服務異常 ${FAIL_COUNT} service(s) down"
          fi

          DATE=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M Taipei')

          MSG="${HEADER}

${R1}
${R2}
${R3}
${R4}
${R5}

_${DATE}_
_⚠️ ATung local + chusMBp Tailscale 不在此範圍_"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MSG}" > /dev/null

          echo "$MSG"

          [ "$FAIL_COUNT" -eq 0 ] || exit 1
