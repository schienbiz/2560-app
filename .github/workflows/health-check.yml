name: Daily Service Health Check

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check services and notify Telegram
        run: |
          check() {
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --connect-timeout 10 --max-time 40 "$1" 2>/dev/null)
            [ "$code" = "200" ] && echo "OK" || echo "FAIL:${code:-timeout}"
          }

          R2=$(check "${{ secrets.APP_URL }}/__up")
          R3=$(check "https://cancel-aneurism-uneven.ngrok-free.dev/health")
          R4=$(check "https://cancel-aneurism-uneven.ngrok-free.dev/pm/api/status")
          R5=$(check "https://cancel-aneurism-uneven.ngrok-free.dev/learn")

          fmt() {
            [ "$2" = "OK" ] && echo "[OK] $1" || echo "[FAIL] $1 ($2)"
          }

          L2=$(fmt "2560-app (CF Worker)" "$R2")
          L3=$(fmt "chusMBp proxy" "$R3")
          L4=$(fmt "ai-pm (chusMBp)" "$R4")
          L5=$(fmt "ai-learning (chusMBp)" "$R5")

          FAILS=$(printf '%s\n' "$R2" "$R3" "$R4" "$R5" | grep -c "^FAIL" || true)
          DATE=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M Taipei')

          if [ "$FAILS" -eq 0 ]; then
            HEADER="All services healthy (${DATE})"
          else
            HEADER="${FAILS} service(s) DOWN (${DATE})"
          fi

          MSG=$(printf '%s\n%s\n%s\n%s\n%s' "$HEADER" "$L2" "$L3" "$L4" "$L5")
          echo "$MSG"

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.HEALTH_CHECK_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.HEALTH_CHECK_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" > /dev/null

          [ "$FAILS" -eq 0 ] || exit 1
