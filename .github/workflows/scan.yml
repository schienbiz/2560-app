name: Daily signal scan

on:
  schedule:
    - cron: "30 8 * * *"     # 4:30pm Taipei (UTC+8) daily (crypto trades weekends too)
  workflow_dispatch:           # manual trigger for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render (cold start can take 30-60s)
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Trigger scan
        run: |
          curl -f --max-time 90 -X POST "${{ secrets.APP_URL }}/internal/scan" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"
