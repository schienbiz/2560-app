name: Daily signal scan

on:
  schedule:
    - cron: "30 8 * * *"     # 4:30pm Taipei (UTC+8) daily (crypto trades weekends too)
  workflow_dispatch:           # manual trigger for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scan
        run: |
          curl -f --max-time 30 -X POST "${{ secrets.APP_URL }}/internal/scan" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"
