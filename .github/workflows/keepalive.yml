name: Keep-alive (app)

on:
  schedule:
    - cron: "0 12 * * 1-5"   # noon UTC Mon–Fri — pre-warms Render 30 min before remind-us (12:30 UTC)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: curl -sf "${{ secrets.APP_URL }}/health" > /dev/null
