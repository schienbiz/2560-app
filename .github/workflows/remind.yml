name: Reminders — TW stocks + Crypto

on:
  schedule:
    - cron: "30 0 * * *"   # 8:30 AM Taipei (UTC+8), daily — before TW market open + after crypto daily candle
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Send TW + crypto reminders
        run: |
          curl -f --max-time 30 -X POST "${{ secrets.APP_URL }}/internal/remind?market=tw,crypto" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.HEALTH_CHECK_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.HEALTH_CHECK_CHAT_ID }}" \
            -d text="🔴 2560 remind(TW/crypto) 失敗 — 後端(Worker→two560-app-2)可能掛了，提醒未發出。查 Render dashboard / Actions log。" > /dev/null || true
