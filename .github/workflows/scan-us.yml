name: Scan — US stocks

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 6:00 AM Taipei next day (UTC+8), Mon–Fri — after US market close (4 PM EST/EDT)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: |
          for i in 1 2 3 4; do
            curl -sf --max-time 30 "${{ secrets.APP_URL }}/health" > /dev/null && echo "App warm" && break
            echo "Still waking up ($i/4)..." && sleep 20
          done

      - name: Trigger US stock scan
        run: |
          curl -f --max-time 90 -X POST "${{ secrets.APP_URL }}/internal/scan?market=us" \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}"
